title: 'Technology Stack Section'
fields:
  -
    handle: subtitle
    field:
      type: text
      display: Subtitle
  -
    handle: title
    field:
      type: text
      display: Title
  -
    handle: highlight_text
    field:
      type: text
      display: 'Highlight Text'
  -
    handle: description
    field:
      type: textarea
      display: Description
  -
    handle: background_color
    field:
      default: true
      type: toggle
      display: 'Background Color'
  -
    handle: technology_cards
    field:
      type: replicator
      display: 'Technology Cards'
      sets:
        new_set_group:
          display: 'New Set Group'
          sets:
            new_set:
              display: 'New Set'
              fields:
                -
                  handle: card_title
                  field:
                    type: text
                    display: 'Card Title'
                -
                  handle: card_description
                  field:
                    type: textarea
                    display: 'Card Description'
