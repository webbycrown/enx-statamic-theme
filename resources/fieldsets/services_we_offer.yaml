title: 'Services We Offer'
fields:
  -
    handle: sub_title
    field:
      type: text
      display: 'Sub Title'
  -
    handle: section_title
    field:
      type: text
      display: 'Section Title'
  -
    handle: highlight_text
    field:
      type: text
      display: 'Highlight Text'
  -
    handle: description
    field:
      type: textarea
      display: Description
  -
    handle: button_text
    field:
      type: text
      display: 'Button Text'
  -
    handle: button_url
    field:
      type: text
      display: 'Button URL'
  -
    handle: services_list
    field:
      type: replicator
      display: 'Services List'
      collapse: true
      sets:
        new_set_group:
          display: 'New Set Group'
          sets:
            new_set:
              display: 'New Set'
              fields:
                -
                  handle: number
                  field:
                    type: text
                    display: Number
                -
                  handle: service_title
                  field:
                    type: text
                    display: 'Service Title'
                -
                  handle: service_description
                  field:
                    type: textarea
                    display: 'Service Description'
