{{ page_builder scope="block" }}

{{ partial src="page_builder/{type}" }}

{{ /page_builder }}


 <section class="3xl:pb-25 2xl:pb-[90px] xl:pb-20 lg:pb-17 pb-12.5">

            <div class="container">
                <div class="grid md:grid-cols-2 grid-cols-1 2xl:gap-8.5 1xl:gap-7.5 xl:gap-6.5 gap-5">
                	{{ collection:locations }}
                    <a href="{{ map_url }}" target="_blank"
                        class="border-l-2 border-primary 3xl:p-10 2xl:p-9 1xl:p-8 xl:p-7.5 xl:py-5 sm:px-7.5 p-5.5 bg-purple-100 group"
                        data-aos="fade-up">
                        <h5 class="3xl:mb-4.5 1xl:mb-4 mb-3.5">{{ title }}</h5>
                        <p class="p2">
                            {{ description }}
                        </p>
                        <div class="flex items-center justify-between w-full 2xl:mt-7.5 1xl:mt-6 mt-5">
                        	{{ if button_text }}
                            <button type="submit"
                                class="btn btn-primary p-1 1xl:ps-[27px] xl:ps-5 ps-3.5 1xl:gap-3 gap-2 rounded-full group">
                                {{ button_text }}
                                <span
                                    class="btn btn-arrow rounded-full xl:size-11 size-9 group-hover:rotate-45 transition-all ease-in-out duration-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22"
                                        fill="none" class="1xl:size-5.5 xl:size-5 size-4">
                                        <g clip-path="url(#clip0_421_92)">
                                            <path
                                                d="M3.37663 17.7995L15.6479 5.52821L5.12966 5.52821L5.03951 4.11577L18.0621 4.11577L18.0621 17.1383L16.6496 17.0482L16.6496 6.52995L4.37836 18.8012L3.37663 17.7995Z"
                                                fill="currentColor" />
                                        </g>
                                    </svg>
                                </span>
                            </button>
                            {{ /if }}
                        </div>
                    </a>
                    {{ /collection:locations }}
                </div>
            </div>

        </section>
