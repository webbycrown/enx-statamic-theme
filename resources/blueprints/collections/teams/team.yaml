title: Team
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
              display: Title
          -
            handle: designation
            field:
              type: text
              display: Designation
          -
            handle: profile_image
            field:
              max_files: 1
              container: assets
              type: assets
              display: 'Profile Image'
          -
            handle: short_description
            field:
              type: textarea
              display: 'Short Description'
          -
            handle: details
            field:
              type: replicator
              display: Details
              sets:
                new_set_group:
                  display: 'New Set Group'
                  sets:
                    new_set:
                      display: 'New Set'
                      fields:
                        -
                          handle: label
                          field:
                            type: text
                            display: Label
                        -
                          handle: value
                          field:
                            type: text
                            display: Value
          -
            handle: biography_title
            field:
              default: Biography
              type: text
              display: 'Biography Title'
          -
            handle: biography
            field:
              type: bard
              display: 'Biography Content'
              remove_empty_nodes: false
              buttons:
                - h2
                - h3
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - removeformat
                - quote
                - anchor
                - image
                - table
                - h1
                - h4
                - h5
                - h6
                - horizontalrule
                - alignleft
                - aligncenter
                - alignright
                - alignjustify
          -
            handle: skills_section
            field:
              type: group
              display: 'Skills Section'
              fields:
                -
                  handle: skills_image
                  field:
                    max_files: 1
                    container: assets
                    type: assets
                    display: 'Skills Image'
                -
                  handle: skills_heading
                  field:
                    type: text
                    display: 'Skills Heading'
                -
                  handle: skills_description
                  field:
                    type: textarea
                    display: 'Skills Description'
                -
                  handle: skills
                  field:
                    type: replicator
                    display: Skills
                    sets:
                      new_set_group:
                        display: 'New Set Group'
                        sets:
                          new_set:
                            display: 'New Set'
                            fields:
                              -
                                handle: skill_name
                                field:
                                  type: text
                                  display: 'Skill Name'
                              -
                                handle: percentage
                                field:
                                  type: integer
                                  display: Percentage
          -
            handle: extra_content
            field:
              type: group
              display: 'Extra Content'
              fields:
                -
                  handle: bottom_content
                  field:
                    remove_empty_nodes: false
                    type: bard
                    display: 'Bottom Content'
                    buttons:
                      - h2
                      - h3
                      - bold
                      - italic
                      - unorderedlist
                      - orderedlist
                      - removeformat
                      - quote
                      - anchor
                      - image
                      - table
                      - h1
                      - h5
                      - h6
                      - underline
                      - small
                      - code
                      - codeblock
                      - horizontalrule
                      - alignleft
                      - aligncenter
                      - alignright
                      - alignjustify
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
