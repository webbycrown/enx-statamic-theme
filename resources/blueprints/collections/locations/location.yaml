title: Location
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
              display: Title
          -
            handle: description
            field:
              type: textarea
              display: Description
          -
            handle: map_url
            field:
              type: text
              display: 'Google Map URL'
              validate:
                - required
          -
            handle: button_text
            field:
              type: text
              display: 'Button Text'
              default: 'View Location'
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
